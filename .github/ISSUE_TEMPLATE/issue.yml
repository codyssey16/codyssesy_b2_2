name: "📋 고효율 작업 관리 시스템"
description: "가로 레이아웃을 최적화하여 메타 정보와 일정을 집약적으로 입력합니다."
title: "[작업] "
labels: ["task"]
assignees:
  - "{{ author }}"

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 작업 등록 및 메타데이터 설정
        > 우측 사이드바가 차지하는 공간을 고려해, 본문 영역의 가로축을 넓게 활용하도록 설계되었습니다.
        ---

  # ==========================================
  # [구획 1] 메타 정보 가로 집약 배치 (유형, 상태, 스토리포인트)
  # ==========================================
  - type: dropdown
    id: type
    render:
      # 대시보드 화면에서 가로 공간을 쪼개어 배치하도록 지시합니다.
      columns: 4
    attributes:
      label: "📌 작업 유형 (Type)"
      options:
        - "task"
        - "bug"
        - "documentation"
        - "refactoring"
        - "enhancement"
    validations:
      required: true

  - type: dropdown
    id: status
    render:
      columns: 4
    attributes:
      label: "⚙️ 진행 상태 (Status)"
      options:
        - "작업대기"
        - "작업중"
        - "완료"
        - "검수"
        - "종료"
        - "이슈발생"
    validations:
      required: true

  - type: dropdown
    id: priority
    render:
      columns: 4
    attributes:
      label: "🔥 우선순위 (Priority)"
      options:
        - "major"
        - "minor"
        - "trivial"
        - "etc"
    validations:
      required: true

  - type: input
    id: story-point
    render:
      columns: 4
    attributes:
      label: "🔢 스토리 포인트"
      placeholder: "예: 1, 2, 3, 5"

  # ==========================================
  # [구획 2] 일정 관리 From - To 가로 배치
  # ==========================================
  - type: input
    id: start-date
    render:
      columns: 6  # 화면의 딱 절반을 차지합니다.
    attributes:
      label: "📅 시작일 (Start Date)"
      placeholder: "YYYY-MM-DD"

  - type: input
    id: target-date
    render:
      columns: 6  # 시작일 바로 옆에 나란히 배치됩니다.
    attributes:
      label: "🏁 목표 완료일 (Target Date)"
      placeholder: "YYYY-MM-DD"

  # ==========================================
  # [구획 3] 연관 이슈 관계성 가로 배치
  # ==========================================
  - type: input
    id: upper-issue
    render:
      columns: 6
    attributes:
      label: "🔼 상위 이슈 (Upper)"
      placeholder: "#이슈번호 또는 URL"

  - type: textarea
    id: sub-issue
    render:
      columns: 6
    attributes:
      label: "🔽 하위 이슈 리스트 (Sub)"
      rows: 2  # 입력 칸이 너무 세로로 길지 않게 압축합니다.
      value: |
        - [ ] 세부 태스크 1
        - [ ] 세부 태스크 2

  - type: markdown
    attributes:
      value: "---"

  # ==========================================
  # [구획 4] 대형 입력창 (가로축 100% 전체 활용)
  # ==========================================
  - type: textarea
    id: description
    render:
      columns: 12  # 가로 전체 너비를 온전히 사용하여 답답함을 없앱니다.
    attributes:
      label: "📝 9. 작업 내용 상세 (Description)"
      description: "화면을 넓게 활용할 수 있도록 와이드 테이블(Wide Table) 형태로 출력됩니다."
      rows: 12     # 기본 노출되는 세로 크기도 대폭 늘렸습니다.
      value: |
        ### 📋 기획 및 개발 요약
        
        | 핵심 목표 | 대상 화면/기능 | 인프라 및 외부 의존성 |
        | :--- | :--- | :--- |
        | 무엇을 구현하나요? | 구체적인 컴포넌트/API 정보 | 타 서비스 연동 필요 여부 등 |

        ### 🔗 참고 자료 및 링크
        * 기획서/피그마: 
        * 관련 API 명세서: 
