name: "📋 통합 작업 관리 시스템"
description: "일정 및 메타 정보를 직관적인 테이블 구조로 입력합니다."
title: "[작업] "
labels: ["task"]
assignees:
  - "{{ author }}"

body:
  # ==========================================
  # [구획 1] 안내 및 대시보드 (From-To 일정 및 기본 정보)
  # ==========================================
  - type: markdown
    attributes:
      value: |
        ## 🚀 작업 정보 등록
        > 아래 표(Table) 양식의 빈칸을 채워 메타데이터와 일정을 한눈에 보이도록 작성해 주세요.
        ---

  # ==========================================
  # [구획 2] 메타데이터 입력 폼
  # ==========================================
  - type: dropdown
    id: type
    attributes:
      label: "📌 작업 유형 (Type)"
      options:
        - "task"
        - "bug"
        - "documentation"
        - "refactoring"
        - "enhancement"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: "⚙️ 진행 상태 (Status)"
      options:
        - "작업대기"
        - "작업중"
        - "완료"
        - "검수"
        - "종료"
        - "이슈발생"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🔥 우선순위 (Priority)"
      options:
        - "major"
        - "minor"
        - "trivial"
        - "etc"
    validations:
      required: true

  # ==========================================
  # [구획 3] 가로 공간을 활용한 종합 일정/규모 대시보드
  # ==========================================
  - type: textarea
    id: schedule-and-points
    attributes:
      label: "📅 일정 및 규모 설정 (Schedule & Story Points)"
      description: "From - To 관계와 작업량을 가로 표 안에 바로 적어주세요."
      value: |

        | 시작일 (Start) | 목표 완료일 (Target) | 스토리 포인트 (SP) |
        | :--- | :--- | :--- |
        | YYYY-MM-DD | YYYY-MM-DD | 예: 3 |

  # ==========================================
  # [구획 4] 이슈 간의 연관 관계 (상하위 태스크)
  # ==========================================
  - type: textarea
    id: issue-relations
    attributes:
      label: "🔗 연관 이슈 및 하위 태스크 (Issue Relations)"
      description: "상위 에픽 이슈와 세부 하위 작업들을 지정합니다."
      value: |
        ### 🔼 상위 이슈 (Upper Issue)
        - 부모 이슈 번호 또는 URL: 

        ### 🔽 하위 태스크 리스트 (Sub-Tasks)
        - [ ] 세부 작업 1
        - [ ] 세부 작업 2

  # ==========================================
  # [구획 5] 대형 작업 내용 상세 입력창 (가로축 100% 활용)
  # ==========================================
  - type: textarea
    id: description
    attributes:
      label: "📝 작업 내용 상세 (Description)"
      description: "작업 목적과 세부 내역을 와이드 테이블 구조에 맞춰 상세히 기술해 주세요."
      value: |
        ### 📋 기획 및 개발 요약
        
        | 핵심 목표 (Goal) | 대상 화면 및 기능 | 인프라 / 외부 의존성 |
        | :--- | :--- | :--- |
        | 무엇을 구현하기 위한 작업인가요? | 구체적인 컴포넌트나 API 정보 | 타 서비스 연동 필요 여부 등 |

        ### 🔗 참고 자료 및 링크
        * 기획서 / 피그마 링크: 
        * 관련 API 명세서: 
    validations:
      required: true
